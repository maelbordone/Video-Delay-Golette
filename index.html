<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Video Delay Golette</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #141922;
      --panel-2: #1b2230;
      --border: #2a3448;
      --text: #f5f7fb;
      --muted: #b8c2d6;
      --accent: #ffffff;
      --good: #dff7df;
      --danger: #f6dede;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .header,
    .controls {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .header {
      padding: 14px 16px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 6px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      min-height: 50px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #000;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.recording {
      background: #ffd8d8;
      color: #000;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .range-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .label {
      font-size: 16px;
      font-weight: 700;
      min-width: 150px;
    }

    input[type="range"] {
      flex: 1;
      min-width: 180px;
    }

    .value {
      min-width: 80px;
      text-align: right;
      font-size: 18px;
      font-weight: 800;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text);
      font-weight: 700;
    }

    .viewer-section {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    .viewer-shell {
      width: 100%;
      flex: 1;
      min-height: 320px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }

    #output {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    .overlay-top,
    .overlay-bottom {
      position: absolute;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .overlay-top {
      top: 12px;
    }

    .overlay-bottom {
      bottom: 12px;
      align-items: flex-end;
    }

    .badge {
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .record-badge {
      background: rgba(180, 0, 0, 0.72);
    }

    video,
    canvas#capture {
      display: none;
    }

    .fullscreen-mode {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0 !important;
      border: none !important;
    }

    @media (orientation: landscape) {
      .viewer-shell {
        min-height: calc(100vh - 225px);
      }
    }

    @media (max-width: 900px) {
      button {
        flex: 1 1 auto;
      }

      .value {
        text-align: left;
      }
    }

    @media (max-width: 700px) {
      .row,
      .range-row {
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .viewer-shell {
        min-height: 52vh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">Video Delay Golette</h1>
      <div class="subtitle">Affichage différé optimisé pour iPad / iPhone</div>
    </div>

    <div class="controls">
      <div class="row">
        <button id="startBtn">Activer la caméra</button>
        <button id="stopBtn" class="secondary">Arrêter</button>
        <button id="flipBtn" class="secondary">Caméra arrière</button>
        <button id="fullscreenBtn" class="secondary">Plein écran</button>
      </div>

      <div class="range-row">
        <div class="label">Délai de capture</div>
        <input id="delayRange" type="range" min="0" max="30" step="1" value="15" />
        <div class="value" id="delayValue">15 s</div>
      </div>

      <div class="row">
        <button id="recordBtn" class="secondary">Démarrer l’enregistrement</button>
        <button id="saveBtn" class="secondary" disabled>Exporter la vidéo</button>
        <button id="clearBtn" class="secondary" disabled>Effacer la vidéo</button>
      </div>

      <div class="meta">
        <div class="pill" id="fpsInfo">Capture : 8 i/s</div>
        <div class="pill" id="formatInfo">Format : détection en cours</div>
        <div class="pill" id="recordingInfo">Enregistrement : inactif</div>
      </div>

      <div class="status" id="status">
        En attente d’autorisation pour la caméra.
      </div>
    </div>

    <div class="viewer-section">
      <div class="viewer-shell" id="viewerShell">
        <canvas id="output"></canvas>

        <div class="overlay-top">
          <div class="badge" id="overlayDelay">Délai : 15 s</div>
          <div class="badge" id="overlayHint">Mode paysage conseillé</div>
        </div>

        <div class="overlay-bottom">
          <div class="badge" id="overlayOwner">Video Delay Golette</div>
          <div class="badge record-badge" id="recordBadge" style="display:none;">REC</div>
        </div>
      </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="capture"></canvas>
  </div>

  <script>
    const video = document.getElementById("video");
    const captureCanvas = document.getElementById("capture");
    const outputCanvas = document.getElementById("output");
    const captureCtx = captureCanvas.getContext("2d", { alpha: false });
    const outputCtx = outputCanvas.getContext("2d", { alpha: false });

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const flipBtn = document.getElementById("flipBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const recordBtn = document.getElementById("recordBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");

    const delayRange = document.getElementById("delayRange");
    const delayValue = document.getElementById("delayValue");
    const overlayDelay = document.getElementById("overlayDelay");
    const statusEl = document.getElementById("status");
    const viewerShell = document.getElementById("viewerShell");

    const fpsInfo = document.getElementById("fpsInfo");
    const formatInfo = document.getElementById("formatInfo");
    const recordingInfo = document.getElementById("recordingInfo");
    const recordBadge = document.getElementById("recordBadge");

    let stream = null;
    let running = false;
    let facingMode = "environment";

    let frames = [];
    let captureInterval = null;
    let renderAnimation = null;

    const CAPTURE_FPS = 8;
    const CAPTURE_INTERVAL_MS = 1000 / CAPTURE_FPS;
    const MAX_EXTRA_KEEP_MS = 5000;

    let canvasStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordedBlob = null;
    let recordedUrl = null;
    let isRecording = false;
    let selectedMimeType = "";
    let recordingStartedAt = null;

    fpsInfo.textContent = `Capture : ${CAPTURE_FPS} i/s`;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateDelayDisplay() {
      const delay = Number(delayRange.value);
      delayValue.textContent = `${delay} s`;
      overlayDelay.textContent = `Délai : ${delay} s`;
    }

    updateDelayDisplay();
    delayRange.addEventListener("input", updateDelayDisplay);

    function resizeOutputCanvas() {
      const rect = outputCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      outputCanvas.width = Math.max(1, Math.floor(rect.width * dpr));
      outputCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
    }

    window.addEventListener("resize", resizeOutputCanvas);

    function clearOutput() {
      outputCtx.fillStyle = "black";
      outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
    }

    function drawMessage(text) {
      clearOutput();
      outputCtx.fillStyle = "#ffffff";
      outputCtx.font = `${Math.max(16, outputCanvas.width * 0.025)}px Arial`;
      outputCtx.textAlign = "center";
      outputCtx.textBaseline = "middle";
      outputCtx.fillText(text, outputCanvas.width / 2, outputCanvas.height / 2);
    }

    function getSupportedMimeType() {
      if (!window.MediaRecorder) return "";

      const candidates = [
        "video/mp4;codecs=h264,aac",
        "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
        "video/mp4",
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm"
      ];

      for (const type of candidates) {
        try {
          if (MediaRecorder.isTypeSupported(type)) {
            return type;
          }
        } catch (_) {}
      }

      return "";
    }

    function updateFormatInfo() {
      selectedMimeType = getSupportedMimeType();
      formatInfo.textContent = selectedMimeType
        ? `Format : ${selectedMimeType}`
        : "Format : non pris en charge ici";
    }

    function updateRecordingUi() {
      if (isRecording) {
        recordBtn.textContent = "Arrêter l’enregistrement";
        recordBtn.classList.add("recording");
        recordBadge.style.display = "inline-block";
      } else {
        recordBtn.textContent = "Démarrer l’enregistrement";
        recordBtn.classList.remove("recording");
        recordBadge.style.display = "none";
      }

      saveBtn.disabled = !recordedBlob;
      clearBtn.disabled = !recordedBlob;

      if (isRecording) {
        const seconds = Math.max(0, Math.floor((Date.now() - recordingStartedAt) / 1000));
        recordingInfo.textContent = `Enregistrement : en cours (${seconds}s)`;
      } else if (recordedBlob) {
        const sizeMb = (recordedBlob.size / (1024 * 1024)).toFixed(1);
        recordingInfo.textContent = `Enregistrement : prêt (${sizeMb} Mo)`;
      } else {
        recordingInfo.textContent = "Enregistrement : inactif";
      }
    }

    function releaseRecordedUrl() {
      if (recordedUrl) {
        URL.revokeObjectURL(recordedUrl);
        recordedUrl = null;
      }
    }

    function resetRecordedMedia() {
      releaseRecordedUrl();
      recordedBlob = null;
      recordedChunks = [];
      updateRecordingUi();
    }

    function makeFileName() {
      const now = new Date();
      const p = (n) => String(n).padStart(2, "0");
      const date = `${now.getFullYear()}-${p(now.getMonth() + 1)}-${p(now.getDate())}`;
      const time = `${p(now.getHours())}-${p(now.getMinutes())}-${p(now.getSeconds())}`;

      let ext = "webm";
      if (selectedMimeType.includes("mp4")) ext = "mp4";

      return `video-delay-golette-${date}-${time}.${ext}`;
    }

    function drawSourceToOutput(source, sourceWidth, sourceHeight) {
      const cw = outputCanvas.width;
      const ch = outputCanvas.height;

      const scale = Math.min(cw / sourceWidth, ch / sourceHeight);
      const drawW = sourceWidth * scale;
      const drawH = sourceHeight * scale;
      const x = (cw - drawW) / 2;
      const y = (ch - drawH) / 2;

      outputCtx.fillStyle = "black";
      outputCtx.fillRect(0, 0, cw, ch);
      outputCtx.drawImage(source, x, y, drawW, drawH);
    }

    function cleanupOldFrames() {
      const now = performance.now();
      const delayMs = Number(delayRange.value) * 1000;
      const keepMs = delayMs + MAX_EXTRA_KEEP_MS;

      while (frames.length > 0 && now - frames[0].time > keepMs) {
        const old = frames.shift();
        try {
          old.bitmap.close();
        } catch (_) {}
      }
    }

    function getFrameForDelay() {
      const now = performance.now();
      const targetTime = now - (Number(delayRange.value) * 1000);

      let candidate = null;
      for (let i = 0; i < frames.length; i++) {
        if (frames[i].time <= targetTime) {
          candidate = frames[i];
        } else {
          break;
        }
      }
      return candidate;
    }

    async function captureFrame() {
      if (!running || !video.videoWidth || !video.videoHeight) return;

      try {
        captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
        const bitmap = await createImageBitmap(captureCanvas);
        frames.push({
          time: performance.now(),
          bitmap
        });
        cleanupOldFrames();
      } catch (err) {
        console.error("Erreur capture :", err);
      }
    }

    function startCaptureLoop() {
      captureInterval = setInterval(() => {
        captureFrame();
      }, CAPTURE_INTERVAL_MS);
    }

    function startRenderLoop() {
      const render = () => {
        if (!running) return;

        const delay = Number(delayRange.value);
        const frame = getFrameForDelay();

        if (delay === 0 && video.videoWidth) {
          drawSourceToOutput(video, video.videoWidth, video.videoHeight);
        } else if (frame) {
          drawSourceToOutput(frame.bitmap, frame.bitmap.width, frame.bitmap.height);
        } else {
          drawMessage("Buffer en cours...");
        }

        if (isRecording) {
          updateRecordingUi();
        }

        renderAnimation = requestAnimationFrame(render);
      };

      render();
    }

    async function startCamera() {
      stopCamera(false);

      try {
        setStatus("Demande d’accès à la caméra...");
        frames = [];

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const vw = video.videoWidth || 640;
        const vh = video.videoHeight || 360;

        const targetWidth = 640;
        const targetHeight = Math.round((vh / vw) * targetWidth);

        captureCanvas.width = targetWidth;
        captureCanvas.height = targetHeight;

        running = true;
        resizeOutputCanvas();
        startCaptureLoop();
        startRenderLoop();

        setStatus("Caméra activée. Le flux différé est en cours.");
      } catch (err) {
        console.error(err);
        setStatus("Impossible d’accéder à la caméra. Vérifie les autorisations Safari et l’hébergement HTTPS.");
      }
    }

    function stopCamera(updateStatus = true) {
      running = false;

      if (captureInterval) {
        clearInterval(captureInterval);
        captureInterval = null;
      }

      if (renderAnimation) {
        cancelAnimationFrame(renderAnimation);
        renderAnimation = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;

      for (const frame of frames) {
        try {
          frame.bitmap.close();
        } catch (_) {}
      }
      frames = [];

      if (isRecording) {
        stopRecording();
      }

      clearOutput();

      if (updateStatus) {
        setStatus("Caméra arrêtée.");
      }
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          if (viewerShell.requestFullscreen) {
            await viewerShell.requestFullscreen();
          } else {
            setStatus("Le plein écran n’est pas pris en charge ici.");
          }
        } else {
          if (document.exitFullscreen) {
            await document.exitFullscreen();
          }
        }
      } catch (err) {
        console.error(err);
        setStatus("Impossible d’ouvrir le plein écran sur cet appareil.");
      }
    }

    function ensureCanvasRecorderReady() {
      if (!window.MediaRecorder) {
        throw new Error("MediaRecorder non disponible.");
      }

      if (!selectedMimeType) {
        throw new Error("Aucun format vidéo compatible détecté.");
      }

      if (!canvasStream) {
        canvasStream = outputCanvas.captureStream(CAPTURE_FPS);
      }
    }

    function startRecording() {
      try {
        if (!running) {
          setStatus("Active d’abord la caméra.");
          return;
        }

        if (isRecording) return;

        ensureCanvasRecorderReady();

        resetRecordedMedia();
        recordedChunks = [];

        mediaRecorder = new MediaRecorder(canvasStream, {
          mimeType: selectedMimeType,
          videoBitsPerSecond: 3500000
        });

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            recordedChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          if (recordedChunks.length > 0) {
            recordedBlob = new Blob(recordedChunks, { type: selectedMimeType });
            releaseRecordedUrl();
            recordedUrl = URL.createObjectURL(recordedBlob);
          }
          isRecording = false;
          recordingStartedAt = null;
          updateRecordingUi();
        };

        mediaRecorder.onerror = (event) => {
          console.error("Erreur MediaRecorder :", event);
          isRecording = false;
          recordingStartedAt = null;
          updateRecordingUi();
          setStatus("Erreur pendant l’enregistrement.");
        };

        mediaRecorder.start(1000);
        isRecording = true;
        recordingStartedAt = Date.now();
        updateRecordingUi();
        setStatus("Enregistrement lancé.");
      } catch (err) {
        console.error(err);
        setStatus("Impossible de démarrer l’enregistrement sur cet appareil.");
      }
    }

    function stopRecording() {
      try {
        if (!isRecording || !mediaRecorder) return;
        mediaRecorder.stop();
        setStatus("Enregistrement arrêté.");
      } catch (err) {
        console.error(err);
        isRecording = false;
        recordingStartedAt = null;
        updateRecordingUi();
        setStatus("Impossible d’arrêter correctement l’enregistrement.");
      }
    }

    async function exportVideo() {
      try {
        if (!recordedBlob) {
          setStatus("Aucune vidéo à exporter.");
          return;
        }

        const fileName = makeFileName();
        const file = new File([recordedBlob], fileName, { type: recordedBlob.type });

        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          await navigator.share({
            files: [file],
            title: "Video Delay Golette",
            text: "Export de la vidéo"
          });
          setStatus("Fenêtre de partage ouverte.");
          return;
        }

        if (!recordedUrl) {
          recordedUrl = URL.createObjectURL(recordedBlob);
        }

        const a = document.createElement("a");
        a.href = recordedUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();

        setStatus("Téléchargement lancé.");
      } catch (err) {
        console.error(err);
        setStatus("Impossible d’exporter la vidéo.");
      }
    }

    function clearRecordedVideo() {
      if (isRecording) {
        setStatus("Arrête d’abord l’enregistrement.");
        return;
      }
      resetRecordedMedia();
      setStatus("Vidéo enregistrée effacée.");
    }

    document.addEventListener("fullscreenchange", () => {
      const isFs = !!document.fullscreenElement;
      fullscreenBtn.textContent = isFs ? "Quitter le plein écran" : "Plein écran";

      if (isFs) {
        viewerShell.classList.add("fullscreen-mode");
      } else {
        viewerShell.classList.remove("fullscreen-mode");
      }

      setTimeout(resizeOutputCanvas, 80);
    });

    startBtn.addEventListener("click", async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Ce navigateur ne gère pas correctement l’accès caméra.");
        return;
      }
      await startCamera();
    });

    stopBtn.addEventListener("click", () => {
      stopCamera(true);
    });

    flipBtn.addEventListener("click", async () => {
      facingMode = facingMode === "environment" ? "user" : "environment";
      flipBtn.textContent = facingMode === "environment" ? "Caméra arrière" : "Caméra avant";

      if (running) {
        await startCamera();
      }
    });

    fullscreenBtn.addEventListener("click", async () => {
      await toggleFullscreen();
    });

    recordBtn.addEventListener("click", () => {
      if (!isRecording) {
        startRecording();
      } else {
        stopRecording();
      }
    });

    saveBtn.addEventListener("click", async () => {
      await exportVideo();
    });

    clearBtn.addEventListener("click", () => {
      clearRecordedVideo();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && running) {
        setStatus("Page mise en arrière-plan. iPad/iPhone peuvent ralentir ou suspendre le flux.");
      }
    });

    window.addEventListener("load", () => {
      updateFormatInfo();
      resizeOutputCanvas();
      drawMessage("Active la caméra");
      updateRecordingUi();
    });
  </script>
</body>
</html>
