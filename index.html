<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Delay</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1c1c1c;
      --text: #f5f5f5;
      --muted: #bdbdbd;
      --accent: #ffffff;
      --border: #2d2d2d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      gap: 12px;
      padding: 12px;
    }

    .topbar {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }

    button.secondary {
      background: #2c2c2c;
      color: #fff;
      border: 1px solid #3d3d3d;
    }

    label {
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    input[type="range"] {
      width: 220px;
      max-width: 100%;
    }

    .value {
      min-width: 90px;
      font-weight: 700;
      font-size: 16px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .viewer-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .viewer {
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    canvas#output {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    .overlay {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    video,
    canvas#capture {
      display: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #232323;
      border: 1px solid #333;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      color: #eaeaea;
    }

    @media (max-width: 768px) {
      .app {
        padding: 10px;
      }

      .topbar {
        padding: 10px;
      }

      button {
        width: 100%;
      }

      .row {
        align-items: stretch;
      }

      input[type="range"] {
        width: 100%;
      }

      .value {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="row">
        <button id="startBtn">Activer la caméra</button>
        <button id="stopBtn" class="secondary">Arrêter</button>
        <button id="flipBtn" class="secondary">Caméra arrière</button>
      </div>

      <div class="row">
        <label for="delayRange">Délai :</label>
        <input id="delayRange" type="range" min="0" max="30" step="1" value="15" />
        <div class="value" id="delayValue">15 s</div>
        <div class="pill" id="fpsInfo">Capture : 8 i/s</div>
      </div>

      <div class="status" id="status">
        En attente d’autorisation caméra.
      </div>

      <div class="small">
        Cette version est volontairement simple : affichage vidéo différé, sans audio.
      </div>
    </div>

    <div class="viewer-wrap">
      <div class="viewer">
        <canvas id="output"></canvas>
        <div class="overlay" id="overlayText">Délai : 15 s</div>
      </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="capture"></canvas>
  </div>

  <script>
    const video = document.getElementById("video");
    const captureCanvas = document.getElementById("capture");
    const outputCanvas = document.getElementById("output");
    const captureCtx = captureCanvas.getContext("2d", { alpha: false });
    const outputCtx = outputCanvas.getContext("2d", { alpha: false });

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const flipBtn = document.getElementById("flipBtn");
    const delayRange = document.getElementById("delayRange");
    const delayValue = document.getElementById("delayValue");
    const statusEl = document.getElementById("status");
    const overlayText = document.getElementById("overlayText");

    let stream = null;
    let running = false;
    let facingMode = "environment"; // "user" ou "environment"
    let frames = []; // { time: number, bitmap: ImageBitmap }
    let captureInterval = null;
    let renderAnimation = null;

    // Réglages simples pour garder de la fluidité
    const CAPTURE_FPS = 8;
    const CAPTURE_INTERVAL_MS = 1000 / CAPTURE_FPS;
    const MAX_EXTRA_KEEP_MS = 4000; // petite marge pour ne pas couper trop vite

    function updateDelayDisplay() {
      const delay = Number(delayRange.value);
      delayValue.textContent = `${delay} s`;
      overlayText.textContent = `Délai : ${delay} s`;
    }

    updateDelayDisplay();
    document.getElementById("fpsInfo").textContent = `Capture : ${CAPTURE_FPS} i/s`;

    delayRange.addEventListener("input", updateDelayDisplay);

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function resizeOutputCanvas() {
      const rect = outputCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      outputCanvas.width = Math.max(1, Math.floor(rect.width * dpr));
      outputCanvas.height = Math.max(1, Math.floor(rect.height * dpr));
    }

    window.addEventListener("resize", resizeOutputCanvas);
    resizeOutputCanvas();

    async function startCamera() {
      stopCamera();

      try {
        setStatus("Demande d’accès à la caméra...");
        frames = [];

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;

        await video.play();

        const vw = video.videoWidth || 640;
        const vh = video.videoHeight || 360;

        // On réduit volontairement la définition capturée pour la mémoire
        const targetWidth = 640;
        const targetHeight = Math.round((vh / vw) * targetWidth);

        captureCanvas.width = targetWidth;
        captureCanvas.height = targetHeight;

        running = true;

        startCaptureLoop();
        startRenderLoop();

        setStatus("Caméra activée. Le flux différé est en cours.");
      } catch (err) {
        console.error(err);
        setStatus("Impossible d’accéder à la caméra. Vérifie les autorisations et l’hébergement en HTTPS.");
      }
    }

    function stopCamera() {
      running = false;

      if (captureInterval) {
        clearInterval(captureInterval);
        captureInterval = null;
      }

      if (renderAnimation) {
        cancelAnimationFrame(renderAnimation);
        renderAnimation = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;

      for (const frame of frames) {
        try {
          frame.bitmap.close();
        } catch (_) {}
      }
      frames = [];

      clearOutput();
      setStatus("Caméra arrêtée.");
    }

    function clearOutput() {
      outputCtx.fillStyle = "black";
      outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
    }

    function drawCoverText(text) {
      clearOutput();
      outputCtx.fillStyle = "white";
      outputCtx.font = `${Math.max(16, outputCanvas.width * 0.025)}px Arial`;
      outputCtx.textAlign = "center";
      outputCtx.textBaseline = "middle";
      outputCtx.fillText(text, outputCanvas.width / 2, outputCanvas.height / 2);
    }

    async function captureFrame() {
      if (!running || !video.videoWidth || !video.videoHeight) return;

      try {
        captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
        const bitmap = await createImageBitmap(captureCanvas);

        frames.push({
          time: performance.now(),
          bitmap
        });

        cleanupOldFrames();
      } catch (err) {
        console.error("Erreur captureFrame:", err);
      }
    }

    function cleanupOldFrames() {
      const now = performance.now();
      const delayMs = Number(delayRange.value) * 1000;
      const keepAfter = delayMs + MAX_EXTRA_KEEP_MS;

      while (frames.length > 0 && now - frames[0].time > keepAfter) {
        const old = frames.shift();
        try {
          old.bitmap.close();
        } catch (_) {}
      }
    }

    function getFrameForDelay() {
      const now = performance.now();
      const targetTime = now - Number(delayRange.value) * 1000;

      let candidate = null;

      for (let i = 0; i < frames.length; i++) {
        if (frames[i].time <= targetTime) {
          candidate = frames[i];
        } else {
          break;
        }
      }

      return candidate;
    }

    function drawBitmapToOutput(bitmap) {
      const cw = outputCanvas.width;
      const ch = outputCanvas.height;
      const iw = bitmap.width;
      const ih = bitmap.height;

      // "contain" pour garder l’image entière
      const scale = Math.min(cw / iw, ch / ih);
      const drawW = iw * scale;
      const drawH = ih * scale;
      const x = (cw - drawW) / 2;
      const y = (ch - drawH) / 2;

      outputCtx.fillStyle = "black";
      outputCtx.fillRect(0, 0, cw, ch);
      outputCtx.drawImage(bitmap, x, y, drawW, drawH);
    }

    function startCaptureLoop() {
      captureInterval = setInterval(() => {
        captureFrame();
      }, CAPTURE_INTERVAL_MS);
    }

    function startRenderLoop() {
      const render = () => {
        if (!running) return;

        const delayMs = Number(delayRange.value) * 1000;
        const frame = getFrameForDelay();

        if (delayMs === 0 && video.videoWidth) {
          // Mode direct si délai à 0
          outputCtx.fillStyle = "black";
          outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);

          const iw = video.videoWidth;
          const ih = video.videoHeight;
          const cw = outputCanvas.width;
          const ch = outputCanvas.height;

          const scale = Math.min(cw / iw, ch / ih);
          const drawW = iw * scale;
          const drawH = ih * scale;
          const x = (cw - drawW) / 2;
          const y = (ch - drawH) / 2;

          outputCtx.drawImage(video, x, y, drawW, drawH);
        } else if (frame) {
          drawBitmapToOutput(frame.bitmap);
        } else {
          drawCoverText("Buffer en cours...");
        }

        renderAnimation = requestAnimationFrame(render);
      };

      render();
    }

    startBtn.addEventListener("click", async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Ce navigateur ne prend pas correctement en charge l’accès caméra.");
        return;
      }

      await startCamera();
    });

    stopBtn.addEventListener("click", () => {
      stopCamera();
    });

    flipBtn.addEventListener("click", async () => {
      facingMode = facingMode === "environment" ? "user" : "environment";
      flipBtn.textContent = facingMode === "environment" ? "Caméra arrière" : "Caméra avant";

      if (running) {
        await startCamera();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden && running) {
        setStatus("Page mise en arrière-plan. Le flux peut être ralenti ou suspendu selon l’appareil.");
      }
    });

    clearOutput();
  </script>
</body>
</html>
